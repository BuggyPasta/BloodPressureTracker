{% extends "base.html" %}

{% block content %}
    <form id="measurements-form">
        {% for i in range(1, 4) %}
        <div class="measurement-group">
            <h3>Measurement {{ i }}</h3>
            <div class="measurement-inputs">
                <div class="input-group">
                    <label for="systolic_{{ i }}">Systolic:</label>
                    <input type="number" id="systolic_{{ i }}" name="systolic_{{ i }}" min="30" max="230">
                    <span class="unit">mm Hg</span>
                </div>
                <div class="input-group">
                    <label for="diastolic_{{ i }}">Diastolic:</label>
                    <input type="number" id="diastolic_{{ i }}" name="diastolic_{{ i }}" min="30" max="230">
                    <span class="unit">mm Hg</span>
                </div>
                <div class="input-group">
                    <label for="bpm_{{ i }}">Heart Rate:</label>
                    <input type="number" id="bpm_{{ i }}" name="bpm_{{ i }}" min="30" max="230">
                    <span class="unit">BPM</span>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="button-group">
            <button type="submit" class="primary-btn">Save Measurements</button>
            <button type="button" class="secondary-btn" onclick="confirmCancel()">Cancel</button>
        </div>
    </form>

    <!-- Cancel Confirmation Modal -->
    <div id="cancel-modal" class="modal">
        <div class="modal-content">
            <h2>Cancel Measurements?</h2>
            <p>Are you sure you want to cancel? All entered measurements will be lost.</p>
            <div class="modal-buttons">
                <button onclick="window.location.href='{{ url_for('main.user_dashboard', user_id=user.id) }}'">
                    Yes, cancel measurements
                </button>
                <button onclick="closeCancelModal()">
                    No, continue entering measurements
                </button>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
